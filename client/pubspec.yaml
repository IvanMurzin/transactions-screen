name: transaction_screen
description: "Flutter + Supabase application built from sdd_template."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.0.1
  intl: ^0.20.2
  injectable: ^2.7.1+4
  json_annotation: ^4.9.0
  logger: ^2.6.2
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.10.0
  url_launcher: ^6.3.2
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  purchases_flutter: ^9.10.0
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0F0F0F"
  android_12:
    color: "#FFFFFF"
    color_dark: "#0F0F0F"

flutter:
  uses-material-design: true
  generate: true

dev_dependencies:
  build_runner: ^2.10.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  freezed: ^3.2.4
  injectable_generator: ^2.12.0
  json_serializable: ^6.11.4
